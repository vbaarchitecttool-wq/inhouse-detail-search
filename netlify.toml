[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--legacy-peer-deps"
  CI = "false"

# SPA（React）用: どのパスに来ても index.html を返す
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Corrected diagram photos keep stable filenames, so force browsers and the
# Service Worker to revalidate them instead of retaining an older replacement.
[[headers]]
  for = "/diagrams/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
